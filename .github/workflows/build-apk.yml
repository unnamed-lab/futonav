name: Build Production APK

# Builds a production Android APK with Gradle (no Expo/EAS cloud build) whenever
# a commit pushed to master/main contains "[BUILD]", or on manual dispatch.
# The native android/ project is gitignored, so it is regenerated with
# `expo prebuild` (codegen only); the APK itself is assembled by Gradle.
# The APK is published as a workflow artifact and a GitHub Release.
on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apk:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[BUILD]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Public build-time config for the JS bundle (read during Gradle bundling).
      EXPO_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      # Injected into AndroidManifest at prebuild time for the native Maps SDK.
      GOOGLE_MAPS_ANDROID_KEY: ${{ secrets.GOOGLE_MAPS_ANDROID_KEY }}
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild native Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install

      - name: Decode release keystore (optional)
        id: keystore
        working-directory: apps/mobile/android/app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Release keystore decoded — building a release-signed APK."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set — APK will be debug-signed (fine for sideloading, not for the Play Store)."
          fi

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          if [ "${{ steps.keystore.outputs.signed }}" = "true" ]; then
            ./gradlew :app:assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file="$PWD/app/release.keystore" \
              -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
          else
            ./gradlew :app:assembleRelease --no-daemon
          fi

      - name: Locate APK
        id: apk
        working-directory: apps/mobile
        run: |
          set -euo pipefail
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced by Gradle."
            exit 1
          fi
          cp "$APK" "$GITHUB_WORKSPACE/futonav.apk"
          ls -lh "$GITHUB_WORKSPACE/futonav.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: futonav-apk
          path: futonav.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: FutoNav APK (build ${{ github.run_number }})
          body: |
            Production APK built with Gradle from ${{ github.sha }}.
            Signing: ${{ steps.keystore.outputs.signed == 'true' && 'release keystore' || 'debug (sideload only)' }}
          files: futonav.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
